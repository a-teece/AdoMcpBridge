name: reusable-cd

on:
  workflow_call:
    inputs:
      tag:
        description: "Bridge version tag to deploy (e.g. v0.1.0)."
        required: true
        type: string
      environment:
        description: "Target environment name (dev | prod)."
        required: true
        type: string
      subscription_id:
        description: "Azure subscription GUID."
        required: true
        type: string
      tenant_id:
        description: "Entra tenant GUID."
        required: true
        type: string
      resource_group:
        description: "Target resource group (e.g. rg-adomcp-prod)."
        required: true
        type: string
    secrets:
      azure_client_id:
        description: "Client ID of the federated identity credential for OIDC login."
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy ${{ inputs.tag }} to ${{ inputs.environment }}
    runs-on: ubuntu-24.04
    environment: ${{ inputs.environment }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Azure login (OIDC federated)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.azure_client_id }}
          tenant-id: ${{ inputs.tenant_id }}
          subscription-id: ${{ inputs.subscription_id }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: v2.4.1

      - name: Install PowerShell 7
        shell: bash
        run: |
          if ! command -v pwsh >/dev/null; then
            sudo apt-get update
            sudo apt-get install -y wget apt-transport-https software-properties-common
            wget -q https://packages.microsoft.com/config/ubuntu/24.04/packages-microsoft-prod.deb
            sudo dpkg -i packages-microsoft-prod.deb
            sudo apt-get update
            sudo apt-get install -y powershell
          fi
          pwsh -v

      - name: Run deploy.ps1
        shell: pwsh
        run: |
          ./deploy.ps1 `
            -Env "${{ inputs.environment }}" `
            -Tag "${{ inputs.tag }}" `
            -SubscriptionId "${{ inputs.subscription_id }}" `
            -ResourceGroup "${{ inputs.resource_group }}"
